  <main id="main">
    <h1 class="u-visually-hidden">Contact — Justin M. Ramirez</h1>
    <section class="section" aria-label="Contact">
      <form class="form" id="contact-form" action="https://formspree.io/f/mjgnwpzo" method="POST" novalidate>
        <div class="form-field">
          <label class="form-label" for="cf-name">Name</label>
          <input class="form-input" id="cf-name" name="name" type="text" autocomplete="name" required aria-describedby="cf-name-error">
          <p class="form-error" id="cf-name-error" hidden>Please enter your name.</p>
        </div>
        <div class="form-field">
          <label class="form-label" for="cf-email">Email</label>
          <input class="form-input" id="cf-email" name="email" type="email" autocomplete="email" required aria-describedby="cf-email-error">
          <p class="form-error" id="cf-email-error" hidden>Please enter a valid email address.</p>
        </div>
        <div class="form-field">
          <label class="form-label" for="cf-message">Message</label>
          <textarea class="form-input" id="cf-message" name="message" rows="5" required aria-describedby="cf-message-error"></textarea>
          <p class="form-error" id="cf-message-error" hidden>Please enter a message.</p>
        </div>
        <div class="form-actions">
          <button type="submit" class="button">Send</button>
          <p class="form-status" role="status" aria-live="polite"></p>
        </div>
      </form>
      <p class="contact-links">
        <a href="https://github.com/justinMR">GitHub</a> · <a href="https://www.linkedin.com/in/justinmramirez">LinkedIn</a>
      </p>
    </section>
  </main>


  <script src="main.js" defer></script>
