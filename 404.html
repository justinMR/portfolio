<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Justin M. Ramirez</title>
  <script>
    // Single-page-app redirect for GitHub Pages project sites.
    // Served under /portfolio/, so keep 1 path segment before the encoded route,
    // then bounce to index.html which restores the real path (see index.html).
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
      l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
      l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
      (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
      l.hash
    );
  </script>
</head>
<body>
  <noscript>
    <p>Page not found. <a href="/portfolio/">Return to justinmr.github.io/portfolio</a>.</p>
  </noscript>
</body>
</html>
